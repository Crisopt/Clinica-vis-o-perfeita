<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Chamadas — Clínica</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0F172A;--surface:#1E293B;--border:rgba(255,255,255,0.08);--orange:#F97316;--green:#10B981;--text:#F8FAFC;--muted:#94A3B8;}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative;}
  .logo-bar{position:fixed;top:0;left:0;right:0;background:var(--surface);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;}
  .logo-bar h1{font-size:18px;font-weight:700;letter-spacing:-0.02em;}
  .logo-bar .clock{font-size:28px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:0.04em;color:var(--muted);}
  .status-conn{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:600;letter-spacing:0.04em;}
  .status-conn.online{background:rgba(16,185,129,0.15);color:var(--green);border:1px solid rgba(16,185,129,0.3);}
  .status-conn.offline{background:rgba(226,75,74,0.15);color:#E24B4A;border:1px solid rgba(226,75,74,0.3);}
  .estado-aguardando{display:flex;flex-direction:column;align-items:center;gap:24px;animation:fadeIn 0.5s ease;}
  .estado-aguardando .icon-wrap{width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,0.04);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--muted);}
  .estado-aguardando h2{font-size:32px;font-weight:600;color:var(--muted);text-align:center;}
  .estado-aguardando p{font-size:16px;color:rgba(148,163,184,0.6);text-align:center;}
  .estado-chamando{display:none;flex-direction:column;align-items:center;gap:0;width:100%;max-width:900px;padding:0 32px;animation:entrar 0.4s cubic-bezier(0.34,1.56,0.64,1);}
  .estado-chamando.ativo{display:flex;}
  @keyframes entrar{from{opacity:0;transform:scale(0.88) translateY(20px);}to{opacity:1;transform:scale(1) translateY(0);}}
  .chamada-card{width:100%;background:linear-gradient(135deg,#1a0a00 0%,#1E293B 60%);border:2px solid var(--orange);border-radius:24px;padding:48px 56px;text-align:center;animation:pulseBorda 1.2s ease-in-out infinite;}
  @keyframes pulseBorda{0%,100%{box-shadow:0 0 40px rgba(249,115,22,0.25),0 0 80px rgba(249,115,22,0.1);border-color:var(--orange);}50%{box-shadow:0 0 80px rgba(249,115,22,0.55),0 0 160px rgba(249,115,22,0.2);border-color:#FDBA74;}}
  .chamada-label{font-size:18px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--orange);margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:10px;}
  .chamada-label .dot-anim{width:10px;height:10px;border-radius:50%;background:var(--orange);animation:blink 1s step-start infinite;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
  .chamada-nome{font-size:clamp(36px,7vw,80px);font-weight:800;color:#fff;line-height:1.1;margin-bottom:16px;letter-spacing:-0.02em;text-shadow:0 0 40px rgba(249,115,22,0.4);}
  .chamada-exame{font-size:clamp(18px,3vw,28px);color:rgba(255,255,255,0.6);font-weight:400;margin-bottom:32px;}
  .chamada-aviso{display:inline-flex;align-items:center;gap:8px;background:rgba(249,115,22,0.12);border:1px solid rgba(249,115,22,0.3);border-radius:100px;padding:10px 24px;font-size:16px;font-weight:600;color:var(--orange);animation:pulseAviso 1.4s ease-in-out infinite;}
  @keyframes pulseAviso{0%,100%{opacity:1;}50%{opacity:0.5;}}
  .estado-atendimento{display:none;flex-direction:column;align-items:center;gap:24px;width:100%;max-width:700px;padding:0 32px;animation:entrar 0.4s ease;}
  .estado-atendimento.ativo{display:flex;}
  .atend-card{width:100%;background:rgba(16,185,129,0.08);border:2px solid var(--green);border-radius:24px;padding:48px 56px;text-align:center;box-shadow:0 0 60px rgba(16,185,129,0.2);animation:fadeIn 0.5s ease;}
  .atend-check{font-size:72px;margin-bottom:16px;}
  .atend-titulo{font-size:clamp(24px,4vw,48px);font-weight:800;color:var(--green);margin-bottom:8px;}
  .atend-nome{font-size:clamp(20px,3vw,32px);color:rgba(255,255,255,0.7);font-weight:500;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .estado-aguardando,.estado-chamando,.estado-atendimento{position:absolute;}
</style>
</head>
<body>
  <div class="logo-bar">
    <h1>📋 Painel de Chamadas — Clínica Particular</h1>
    <div style="display:flex;align-items:center;gap:16px;">
      <span class="status-conn offline" id="connStatus">● Conectando...</span>
      <div class="clock" id="clock2">--:--:--</div>
    </div>
  </div>
  <div class="estado-aguardando" id="eAguardando">
    <div class="icon-wrap">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
    </div>
    <h2>Aguardando chamada...</h2>
    <p>Sua vez será exibida aqui</p>
  </div>
  <div class="estado-chamando" id="eChamando">
    <div class="chamada-card">
      <div class="chamada-label"><span class="dot-anim"></span>Por favor, dirija-se ao consultório<span class="dot-anim"></span></div>
      <div class="chamada-nome" id="pcNome">—</div>
      <div class="chamada-exame" id="pcExame">—</div>
      <div class="chamada-aviso">🔔 Sua vez chegou!</div>
    </div>
  </div>
  <div class="estado-atendimento" id="eAtendimento">
    <div class="atend-card">
      <div class="atend-check">✅</div>
      <div class="atend-titulo">Em atendimento</div>
      <div class="atend-nome" id="pcNomeAtend">—</div>
    </div>
  </div>
<script>
  function tick(){const n=new Date();document.getElementById('clock2').textContent=n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
  tick();setInterval(tick,1000);

  firebase.initializeApp({
    apiKey:"AIzaSyDEl8iA89RQLD75WEtUnE2cGtRQam6kI8M",
    authDomain:"clinicaparticular.firebaseapp.com",
    databaseURL:"https://clinicaparticular-default-rtdb.firebaseio.com",
    projectId:"clinicaparticular",
    storageBucket:"clinicaparticular.firebasestorage.app",
    messagingSenderId:"640766289975",
    appId:"1:640766289975:web:ed63707711b46e051bf7b2"
  });

  const db = firebase.database();
  db.ref('.info/connected').on('value', snap => {
    const el = document.getElementById('connStatus');
    if (snap.val()) { el.textContent='● Online'; el.className='status-conn online'; }
    else { el.textContent='● Offline'; el.className='status-conn offline'; }
  });

  let audioCtx=null, chamandoInterval=null, nomeAtual='', ultimoTs=0, autoLimparTimer=null;

  function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
  function tocaSom(){
    try{
      const ctx=getAudio();
      const toques=[{freq:880,inicio:0,dur:0.18,vol:0.5},{freq:1100,inicio:0.22,dur:0.18,vol:0.5},{freq:880,inicio:0.44,dur:0.28,vol:0.4}];
      toques.forEach(t=>{
        const osc=ctx.createOscillator(),gain=ctx.createGain();
        osc.connect(gain);gain.connect(ctx.destination);
        osc.type='sine';osc.frequency.setValueAtTime(t.freq,ctx.currentTime+t.inicio);
        gain.gain.setValueAtTime(0,ctx.currentTime+t.inicio);
        gain.gain.linearRampToValueAtTime(t.vol,ctx.currentTime+t.inicio+0.02);
        gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t.inicio+t.dur);
        osc.start(ctx.currentTime+t.inicio);osc.stop(ctx.currentTime+t.inicio+t.dur+0.05);
      });
    }catch(e){console.warn('Audio',e);}
  }

  function mostrarChamada(nome,exame){
    nomeAtual=nome;
    document.getElementById('pcNome').textContent=nome;
    document.getElementById('pcExame').textContent=exame||'Consulta';
    document.getElementById('eAguardando').style.display='none';
    document.getElementById('eAtendimento').classList.remove('ativo');
    document.getElementById('eChamando').classList.add('ativo');
    tocaSom();
    if(chamandoInterval)clearInterval(chamandoInterval);
    chamandoInterval=setInterval(tocaSom,6000);
    if(autoLimparTimer)clearTimeout(autoLimparTimer);
    autoLimparTimer=setTimeout(mostrarAguardando,3*60*1000);
  }

  function mostrarAtendimento(nome){
    if(chamandoInterval){clearInterval(chamandoInterval);chamandoInterval=null;}
    if(autoLimparTimer){clearTimeout(autoLimparTimer);autoLimparTimer=null;}
    document.getElementById('pcNomeAtend').textContent=nome||nomeAtual||'—';
    document.getElementById('eAguardando').style.display='none';
    document.getElementById('eChamando').classList.remove('ativo');
    document.getElementById('eAtendimento').classList.add('ativo');
    setTimeout(mostrarAguardando,5000);
  }

  function mostrarAguardando(){
    if(chamandoInterval){clearInterval(chamandoInterval);chamandoInterval=null;}
    if(autoLimparTimer){clearTimeout(autoLimparTimer);autoLimparTimer=null;}
    document.getElementById('eAguardando').style.display='';
    document.getElementById('eChamando').classList.remove('ativo');
    document.getElementById('eAtendimento').classList.remove('ativo');
  }

  db.ref('agenda_l2/painel').on('value', snap => {
    if(!snap.exists())return;
    const d=snap.val();
    if(!d||!d.ts)return;
    if(d.ts===ultimoTs)return;
    ultimoTs=d.ts;
    if(d.status==='chamando'){mostrarChamada(d.nome,d.exame);}
    else if(d.status==='parar'){mostrarAtendimento(d.nome||nomeAtual);}
  });
</script>
</body>
</html>
